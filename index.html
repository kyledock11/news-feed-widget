<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Feed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #191919;
    color: #e8e4df;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: #191919; }
  ::-webkit-scrollbar-thumb { background: #2a2725; border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3530; }
  * { scrollbar-width: thin; scrollbar-color: #2a2725 #191919; }

  .container {
    width: 100%;
    padding: 1.25rem 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 8px;
  }

  .sticky-top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #191919;
    padding-bottom: 0;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0;
    padding-top: 0.25rem;
    padding-bottom: 0.75rem;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .ascii-accent {
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    line-height: 1;
    color: #4a4540;
    white-space: pre;
    user-select: none;
    letter-spacing: -0.05em;
  }

  .label {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: #d0cbc5;
  }

  .last-updated {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: #6b6660;
    text-transform: uppercase;
  }

  /* Category Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    padding-bottom: 0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6b6660;
    padding: 0.6rem 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    transition: color 0.2s ease, border-color 0.2s ease;
    user-select: none;
  }

  .tab:hover { color: #a09a92; }

  .tab.active {
    color: #d0cbc5;
    border-bottom-color: #d0cbc5;
  }

  .tab .count {
    font-size: 0.6rem;
    color: #4a4640;
    margin-left: 0.3rem;
  }

  .tab.active .count { color: #7a756e; }

  /* Feed */
  .feed {
    display: flex;
    flex-direction: column;
  }

  .article {
    padding: 1rem 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    position: relative;
  }

  .article.visible { opacity: 1; transform: translateY(0); }
  .article:last-child { border-bottom: none; }

  .article.dismissed {
    opacity: 0;
    max-height: 0;
    padding: 0;
    overflow: hidden;
    transition: opacity 0.3s ease, max-height 0.4s ease 0.1s, padding 0.4s ease 0.1s;
  }

  .article-divider {
    font-family: 'Courier New', monospace;
    font-size: 0.5rem;
    color: #2a2725;
    text-align: center;
    padding: 0.25rem 0;
    user-select: none;
    letter-spacing: 0.3em;
  }

  .article-header {
    cursor: pointer;
    padding: 0.25rem 0;
    border-radius: 4px;
    transition: background 0.15s ease;
  }

  .article-header:hover { background: rgba(255, 255, 255, 0.02); margin: 0 -0.5rem; padding: 0.25rem 0.5rem; }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.35rem;
  }

  .article-category {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.55rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.04);
  }

  .cat-ai { color: #7eb8d0; }
  .cat-construction { color: #c4a35a; }
  .cat-unreal { color: #8a8ed0; }
  .cat-gaming { color: #6ec07a; }
  .cat-technology { color: #c08a6e; }
  .cat-startups { color: #c07eb8; }
  .cat-current { color: #d0c07e; }

  .tab-special {
    color: #7eb8d0;
    font-style: italic;
  }

  .tab-special.active {
    color: #a0d0e8;
    border-bottom-color: #a0d0e8;
  }

  .article-source {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.6rem;
    color: #6b6660;
  }

  .article-time {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    color: #5a5650;
  }

  .article-title-row {
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .article-caret {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    margin-top: 0.35rem;
    color: #5a5650;
    transition: transform 0.2s ease, color 0.2s ease;
  }

  .article-header:hover .article-caret { color: #8a857e; }
  .article.expanded .article-caret { transform: rotate(90deg); color: #a09a92; }

  .article-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 1.15rem;
    line-height: 1.5;
    color: #f2efea;
    margin-bottom: 0.3rem;
    flex: 1;
  }

  .article-tldr {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    line-height: 1.55;
    color: #958f88;
  }

  .tldr-label {
    font-weight: 500;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6b6660;
    margin-right: 0.3rem;
  }

  .article-expand {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }

  .article.expanded .article-expand {
    max-height: 5000px;
    opacity: 1;
    transition: max-height 0.5s ease, opacity 0.3s ease;
  }

  .article-content {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #b0aba5;
    padding: 0.75rem 0 0.5rem 1.6rem;
    white-space: pre-wrap;
  }

  .article-content-loading {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    color: #6b6660;
    padding: 0.75rem 0 0.5rem 1.6rem;
    letter-spacing: 0.05em;
  }

  .article-summary-label {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7eb8d0;
    margin-bottom: 0.5rem;
  }

  .article-summary {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #c8c3bc;
    margin-bottom: 0.75rem;
    white-space: pre-wrap;
  }

  .article-raw-label {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #5a5650;
    cursor: pointer;
    margin-bottom: 0.4rem;
    transition: color 0.2s ease;
  }

  .article-raw-label:hover { color: #8a857e; }

  .article-raw {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    line-height: 1.6;
    color: #8a857e;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    white-space: pre-wrap;
  }

  .article-raw.show { max-height: 3000px; }

  .article-ask {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
    align-items: center;
  }

  .article-ask-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    color: #e8e4df;
    outline: none;
    transition: border-color 0.2s ease;
  }

  .article-ask-input::placeholder { color: #5a5650; }
  .article-ask-input:focus { border-color: rgba(126, 184, 208, 0.3); }

  .article-ask-btn {
    background: rgba(126, 184, 208, 0.12);
    border: 1px solid rgba(126, 184, 208, 0.2);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #7eb8d0;
    cursor: pointer;
    transition: background 0.2s ease;
    white-space: nowrap;
  }

  .article-ask-btn:hover { background: rgba(126, 184, 208, 0.2); }
  .article-ask-btn:disabled { opacity: 0.4; cursor: default; }

  .article-thread {
    margin-top: 0.75rem;
  }

  .thread-q {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.75rem;
    color: #7eb8d0;
    margin-bottom: 0.3rem;
  }

  .thread-a {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    line-height: 1.65;
    color: #c8c3bc;
    margin-bottom: 0.75rem;
    white-space: pre-wrap;
  }

  .thread-loading {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    color: #6b6660;
    margin-bottom: 0.75rem;
  }

  .article-vote {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-left: auto;
  }

  .vote-btn {
    background: none;
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 4px;
    padding: 0.3rem 0.45rem;
    cursor: pointer;
    font-size: 0.7rem;
    line-height: 1;
    color: #5a5650;
    transition: all 0.2s ease;
  }

  .vote-btn:hover { border-color: rgba(255, 255, 255, 0.12); color: #8a857e; }
  .vote-btn.voted-up { border-color: rgba(110, 192, 122, 0.3); color: #6ec07a; background: rgba(110, 192, 122, 0.06); }
  .vote-btn.voted-down { border-color: rgba(192, 110, 110, 0.3); color: #c06e6e; background: rgba(192, 110, 110, 0.06); }
  .vote-btn:disabled { cursor: default; }

  .article-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.5rem;
    padding-left: 1.6rem;
  }

  .article-read-more {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #7eb8d0;
    text-decoration: none;
    margin-top: 0.5rem;
    transition: color 0.2s ease;
  }

  .article-read-more:hover { color: #a0d0e8; }

  /* States */
  .loading-state, .error-state, .empty-state {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    color: #6b6660;
    padding: 2rem 0;
    text-align: center;
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* Personalization indicator */
  .personalized-tag {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #4a4640;
    margin-left: auto;
  }
</style>
</head>
<body>
<div class="container">
  <div class="sticky-top">
    <div class="header">
      <div class="header-left">
        <div class="ascii-accent">▚▞
▞▚</div>
        <div class="label">News Feed</div>
      </div>
      <div class="last-updated" id="last-updated"></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="feed" id="feed">
    <div class="loading-state">Fetching headlines<span class="loading-dots"></span></div>
  </div>
</div>

<script>
const FEEDS = {
  current: {
    name: 'Current Events',
    class: 'cat-current',
    sources: [
      { name: 'AP News', url: 'https://rsshub.app/apnews/topics/apf-topnews' },
      { name: 'Reuters', url: 'https://rsshub.app/reuters/world' },
      { name: 'BBC', url: 'https://feeds.bbci.co.uk/news/rss.xml' },
      { name: 'NPR', url: 'https://feeds.npr.org/1001/rss.xml' }
    ]
  },
  ai: {
    name: 'AI',
    class: 'cat-ai',
    sources: [
      { name: 'MIT Tech Review', url: 'https://www.technologyreview.com/feed/' },
      { name: 'Ars Technica AI', url: 'https://feeds.arstechnica.com/arstechnica/technology-lab' },
      { name: 'The Verge AI', url: 'https://www.theverge.com/rss/ai-artificial-intelligence/index.xml' }
    ]
  },
  construction: {
    name: 'Construction',
    class: 'cat-construction',
    sources: [
      { name: 'Construction Dive', url: 'https://www.constructiondive.com/feeds/news/' },
      { name: 'ENR', url: 'https://www.enr.com/rss/1-enr-top-stories' }
    ]
  },
  unreal: {
    name: 'Unreal',
    class: 'cat-unreal',
    sources: [
      { name: 'Unreal Engine', url: 'https://www.unrealengine.com/en-US/feed' },
      { name: '80 Level', url: 'https://80.lv/feed/' }
    ]
  },
  gaming: {
    name: 'Gaming',
    class: 'cat-gaming',
    sources: [
      { name: 'PC Gamer', url: 'https://www.pcgamer.com/rss/' },
      { name: 'IGN', url: 'https://feeds.feedburner.com/ign/all' },
      { name: 'Kotaku', url: 'https://kotaku.com/rss' }
    ]
  },
  technology: {
    name: 'Technology',
    class: 'cat-technology',
    sources: [
      { name: 'Hacker News', url: 'https://hnrss.org/frontpage' },
      { name: 'TechCrunch', url: 'https://techcrunch.com/feed/' },
      { name: 'The Verge', url: 'https://www.theverge.com/rss/index.xml' }
    ]
  },
  startups: {
    name: 'Startups',
    class: 'cat-startups',
    sources: [
      { name: 'TechCrunch Startups', url: 'https://techcrunch.com/category/startups/feed/' },
      { name: 'Product Hunt', url: 'https://www.producthunt.com/feed' }
    ]
  }
};

const STORAGE_KEY = 'newsfeed_prefs';
const CACHE_KEY = 'newsfeed_cache';
const CACHE_TTL = 30 * 60 * 1000; // 30 min cache
const MAX_ARTICLES = 50;
const REFRESH_INTERVAL = 15 * 60 * 1000; // 15 min

let allArticles = [];
let activeCategory = 'all';
const dismissedTitles = new Set();

// --- Personalization ---
function getPrefs() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function savePrefs(prefs) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(prefs));
}

function trackClick(category) {
  const prefs = getPrefs();
  if (!prefs.clicks) prefs.clicks = {};
  prefs.clicks[category] = (prefs.clicks[category] || 0) + 1;
  prefs.lastClick = Date.now();
  savePrefs(prefs);
}

function trackVote(category, source, direction, isActive) {
  const prefs = getPrefs();
  if (!prefs.votes) prefs.votes = {};
  if (!prefs.sourceVotes) prefs.sourceVotes = {};

  // Category-level signal
  if (!prefs.votes[category]) prefs.votes[category] = { up: 0, down: 0 };
  if (isActive) {
    prefs.votes[category][direction]++;
  } else {
    prefs.votes[category][direction] = Math.max(0, prefs.votes[category][direction] - 1);
  }

  // Source-level signal
  if (!prefs.sourceVotes[source]) prefs.sourceVotes[source] = { up: 0, down: 0 };
  if (isActive) {
    prefs.sourceVotes[source][direction]++;
  } else {
    prefs.sourceVotes[source][direction] = Math.max(0, prefs.sourceVotes[source][direction] - 1);
  }

  savePrefs(prefs);
}

function getCategoryWeights() {
  const prefs = getPrefs();
  const clicks = prefs.clicks || {};
  const votes = prefs.votes || {};

  // Combined signal: clicks + votes
  const totalClicks = Object.values(clicks).reduce((a, b) => a + b, 0);
  const totalVotes = Object.values(votes).reduce((a, v) => a + (v.up || 0) + (v.down || 0), 0);

  if (totalClicks + totalVotes < 3) return null;

  const weights = {};
  const categories = Object.keys(FEEDS);
  const base = 1 / categories.length;

  categories.forEach(cat => {
    const clickRatio = totalClicks > 0 ? (clicks[cat] || 0) / totalClicks : 0;

    // Votes: thumbs up boosts, thumbs down suppresses
    const catVotes = votes[cat] || { up: 0, down: 0 };
    const voteSignal = totalVotes > 0
      ? ((catVotes.up || 0) - (catVotes.down || 0) * 1.5) / totalVotes
      : 0;

    // Blend: 30% base, 35% clicks, 35% votes
    weights[cat] = 0.3 * base + 0.35 * clickRatio + 0.35 * Math.max(0, base + voteSignal);
  });

  return weights;
}

// --- RSS Fetching ---
const CORS_PROXY = 'https://cors-proxy.kyle-d7d.workers.dev';

function parseRSS(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');

  // Check for parse errors
  if (doc.querySelector('parsererror')) return [];

  // Try RSS 2.0 format first, then Atom
  let items = Array.from(doc.querySelectorAll('item'));
  const isAtom = items.length === 0;
  if (isAtom) {
    items = Array.from(doc.querySelectorAll('entry'));
  }

  const results = [];
  for (const item of items) {
    // Title — handle CDATA
    const titleEl = item.querySelector('title');
    const title = titleEl ? titleEl.textContent.trim() : '';

    // Link — RSS uses <link>text</link>, Atom uses <link href="..."/>
    let link = '';
    const linkEls = item.querySelectorAll('link');
    for (const l of linkEls) {
      const href = l.getAttribute('href');
      if (href) { link = href; break; }
      if (l.textContent.trim()) { link = l.textContent.trim(); break; }
    }

    // Description
    const descEl = item.querySelector('description')
      || item.querySelector('summary')
      || item.querySelector('content');
    const description = descEl ? descEl.textContent.trim() : '';

    // Date
    const dateEl = item.querySelector('pubDate')
      || item.querySelector('published')
      || item.querySelector('updated');
    const pubDate = dateEl ? dateEl.textContent.trim() : '';

    if (title) {
      results.push({ title, link, description, pubDate });
    }
  }

  return results;
}

async function fetchFeed(source, category) {
  const proxyUrl = `${CORS_PROXY}/?url=${encodeURIComponent(source.url)}`;

  try {
    const res = await fetch(proxyUrl);
    if (!res.ok) return [];
    const xml = await res.text();
    const items = parseRSS(xml).slice(0, 8);

    return items.map(item => ({
      title: cleanText(item.title || ''),
      tldr: makeTLDR(item.description || ''),
      fullContent: cleanText(item.description || ''),
      link: item.link || '#',
      source: source.name,
      category: category,
      categoryName: FEEDS[category].name,
      categoryClass: FEEDS[category].class,
      pubDate: new Date(item.pubDate || Date.now()),
      timestamp: item.pubDate
    })).filter(a => a.title.length > 0);
  } catch {
    return [];
  }
}

function cleanText(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  return div.textContent.trim();
}

function makeTLDR(html) {
  let text = cleanText(html);
  // Remove "Continue reading..." and similar
  text = text.replace(/Continue reading.*/i, '').trim();
  text = text.replace(/Read more.*/i, '').trim();
  text = text.replace(/\[…\]/g, '').trim();
  text = text.replace(/\.{3,}/g, '').trim();

  // Get first 1-2 sentences, max ~180 chars
  const sentences = text.match(/[^.!?]+[.!?]+/g);
  if (sentences) {
    let tldr = sentences[0].trim();
    if (tldr.length < 80 && sentences[1]) {
      tldr += ' ' + sentences[1].trim();
    }
    if (tldr.length > 200) tldr = tldr.slice(0, 197).trimEnd() + '...';
    return tldr;
  }

  if (text.length > 200) return text.slice(0, 197).trimEnd() + '...';
  return text || '';
}

function relativeTime(date) {
  const now = new Date();
  const diffMs = now - date;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHr = Math.floor(diffMin / 60);
  const diffDay = Math.floor(diffHr / 24);

  if (diffMin < 1) return 'just now';
  if (diffMin < 60) return `${diffMin}m ago`;
  if (diffHr < 24) return `${diffHr}h ago`;
  if (diffDay === 1) return 'yesterday';
  if (diffDay < 7) return `${diffDay}d ago`;
  return `${Math.floor(diffDay / 7)}w ago`;
}

// --- Caching ---
function getCachedArticles() {
  try {
    const cached = JSON.parse(localStorage.getItem(CACHE_KEY));
    if (cached && cached.articles && cached.articles.length > 0 && Date.now() - cached.time < CACHE_TTL) {
      return cached.articles.map(a => ({ ...a, pubDate: new Date(a.pubDate) }));
    }
  } catch {}
  return null;
}

function cacheArticles(articles) {
  localStorage.setItem(CACHE_KEY, JSON.stringify({ time: Date.now(), articles }));
}

// --- Fetching All ---
async function fetchAllFeeds() {
  const cached = getCachedArticles();
  if (cached) return cached;

  const promises = [];
  for (const [category, config] of Object.entries(FEEDS)) {
    for (const source of config.sources) {
      promises.push(fetchFeed(source, category));
    }
  }

  const results = await Promise.allSettled(promises);
  let articles = [];
  for (const r of results) {
    if (r.status === 'fulfilled') articles.push(...r.value);
  }

  // Deduplicate by title similarity
  const seen = new Set();
  articles = articles.filter(a => {
    const key = a.title.toLowerCase().slice(0, 60);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  // Sort by date
  articles.sort((a, b) => b.pubDate - a.pubDate);

  // Apply personalization weights
  const weights = getCategoryWeights();
  if (weights) {
    articles = applyWeights(articles, weights);
  }

  articles = articles.slice(0, MAX_ARTICLES);
  cacheArticles(articles);
  return articles;
}

function applyWeights(articles, weights) {
  // Score each article based on category weight and recency
  const now = Date.now();
  return articles.map(a => {
    const recency = Math.max(0, 1 - (now - a.pubDate.getTime()) / (7 * 24 * 60 * 60 * 1000)); // decay over 7 days
    const catWeight = weights[a.category] || 0.1;
    a._score = catWeight * 0.6 + recency * 0.4;
    return a;
  }).sort((a, b) => b._score - a._score);
}

// --- For You: articles from categories you engage with most ---
function getForYouArticles(articles) {
  const prefs = getPrefs();
  const clicks = prefs.clicks || {};
  const votes = prefs.votes || {};

  // Score each category by engagement
  const catScores = {};
  const categories = Object.keys(FEEDS);

  categories.forEach(cat => {
    const clickScore = clicks[cat] || 0;
    const v = votes[cat] || { up: 0, down: 0 };
    catScores[cat] = clickScore * 1 + (v.up || 0) * 3 - (v.down || 0) * 5;
  });

  // Get total engagement
  const totalScore = Object.values(catScores).reduce((a, b) => a + Math.max(0, b), 0);
  if (totalScore < 3) {
    // Not enough data — return top articles by recency
    return articles.slice(0, 15);
  }

  // Get top categories (positive scores only)
  const topCats = categories
    .filter(c => catScores[c] > 0)
    .sort((a, b) => catScores[b] - catScores[a]);

  if (topCats.length === 0) return articles.slice(0, 15);

  // Also factor in source-level preferences
  const sourceVotes = prefs.sourceVotes || {};

  const now = Date.now();
  const scored = articles
    .filter(a => topCats.includes(a.category))
    .map(a => {
      const recency = Math.max(0, 1 - (now - a.pubDate.getTime()) / (3 * 24 * 60 * 60 * 1000));
      const catRank = 1 - (topCats.indexOf(a.category) / topCats.length);
      const sv = sourceVotes[a.source] || { up: 0, down: 0 };
      const sourceBoost = ((sv.up || 0) - (sv.down || 0) * 2) * 0.1;
      a._fyScore = catRank * 0.4 + recency * 0.4 + Math.max(-0.2, sourceBoost) + 0.2;
      return a;
    })
    .sort((a, b) => b._fyScore - a._fyScore);

  return scored.slice(0, 20);
}

// --- Discovery: articles from categories you don't usually engage with ---
function getDiscoveryArticles(articles) {
  const prefs = getPrefs();
  const clicks = prefs.clicks || {};
  const votes = prefs.votes || {};

  const categories = Object.keys(FEEDS);

  // Score each category by engagement (same as For You)
  const catScores = {};
  categories.forEach(cat => {
    const clickScore = clicks[cat] || 0;
    const v = votes[cat] || { up: 0, down: 0 };
    catScores[cat] = clickScore * 1 + (v.up || 0) * 3 - (v.down || 0) * 5;
  });

  const totalEngagement = Object.values(catScores).reduce((a, b) => a + Math.max(0, b), 0);

  // Discovery targets: categories with low or no engagement
  // But NOT categories that have been actively downvoted
  const discoveryCats = categories.filter(cat => {
    const v = votes[cat] || { up: 0, down: 0 };
    const activelyRejected = (v.down || 0) > 2 && (v.down || 0) > (v.up || 0) * 2;
    return !activelyRejected && catScores[cat] < (totalEngagement / categories.length);
  });

  if (discoveryCats.length === 0) {
    // User engages with everything — show random mix
    const shuffled = [...articles].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 10);
  }

  // Get articles from discovery categories, prioritize recency
  const now = Date.now();
  const discoveryPool = articles
    .filter(a => discoveryCats.includes(a.category))
    .map(a => {
      const recency = Math.max(0, 1 - (now - a.pubDate.getTime()) / (3 * 24 * 60 * 60 * 1000));
      // Add slight randomness so it feels fresh each time
      a._discScore = recency * 0.6 + Math.random() * 0.4;
      return a;
    })
    .sort((a, b) => b._discScore - a._discScore);

  return discoveryPool.slice(0, 12);
}

// --- Rendering ---
function renderTabs(articles) {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';

  const counts = { all: articles.length };
  for (const a of articles) {
    counts[a.category] = (counts[a.category] || 0) + 1;
  }

  const allTab = createTab('all', 'All', counts.all);
  tabsEl.appendChild(allTab);

  // For You tab
  const forYouArticles = getForYouArticles(articles);
  if (forYouArticles.length > 0) {
    tabsEl.appendChild(createTab('foryou', 'For You', forYouArticles.length, true));
  }

  // Discovery tab
  const discoveryArticles = getDiscoveryArticles(articles);
  if (discoveryArticles.length > 0) {
    tabsEl.appendChild(createTab('discovery', 'Discovery', discoveryArticles.length, true));
  }

  for (const [key, config] of Object.entries(FEEDS)) {
    if (counts[key]) {
      tabsEl.appendChild(createTab(key, config.name, counts[key]));
    }
  }
}

function createTab(key, name, count, isSpecial) {
  const tab = document.createElement('div');
  tab.className = `tab${activeCategory === key ? ' active' : ''}${isSpecial ? ' tab-special' : ''}`;
  tab.innerHTML = `${esc(name)}<span class="count">${count}</span>`;
  tab.addEventListener('click', () => {
    activeCategory = key;
    renderTabs(allArticles);
    renderFeed(allArticles);
  });
  return tab;
}

function renderFeed(articles) {
  const feed = document.getElementById('feed');
  feed.innerHTML = '';

  let filtered;
  if (activeCategory === 'all') {
    filtered = articles;
  } else if (activeCategory === 'foryou') {
    filtered = getForYouArticles(articles);
  } else if (activeCategory === 'discovery') {
    filtered = getDiscoveryArticles(articles);
  } else {
    filtered = articles.filter(a => a.category === activeCategory);
  }

  if (filtered.length === 0) {
    feed.innerHTML = '<div class="empty-state">No articles found for this category.</div>';
    return;
  }

  const caretSVG = `<svg class="article-caret" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="6 4 10 8 6 12"/></svg>`;

  filtered.forEach((article, i) => {
    const el = document.createElement('div');
    el.className = 'article';
    let loaded = false;

    el.innerHTML = `
      <div class="article-header">
        <div class="article-meta">
          <span class="article-category ${esc(article.categoryClass)}">${esc(article.categoryName)}</span>
          <span class="article-source">${esc(article.source)}</span>
          <span class="article-time">${esc(relativeTime(article.pubDate))}</span>
          <div class="article-vote">
            <button class="vote-btn" data-vote="up" title="More like this">&#9650;</button>
            <button class="vote-btn" data-vote="down" title="Less like this">&#9660;</button>
          </div>
        </div>
        <div class="article-title-row">
          ${caretSVG}
          <div class="article-title">${esc(article.title)}</div>
        </div>
        ${article.tldr ? `<div class="article-tldr" style="padding-left:1.6rem"><span class="tldr-label">TLDR</span>${esc(article.tldr)}</div>` : ''}
      </div>
      <div class="article-expand">
        <div class="article-content-loading">Loading article...</div>
      </div>
    `;

    // Store article metadata on element for fallback context
    el.dataset.articleTitle = article.title;
    el.dataset.articleTldr = article.tldr || '';

    const header = el.querySelector('.article-header');
    header.addEventListener('click', (e) => {
      // Don't toggle if clicking vote buttons
      if (e.target.closest('.vote-btn')) return;
      e.preventDefault();
      const isExpanding = !el.classList.contains('expanded');
      el.classList.toggle('expanded');
      trackClick(article.category);

      // Lazy load full article on first expand
      if (isExpanding && !loaded) {
        loaded = true;
        loadFullArticle(article.link, el);
      }
    });

    // Vote buttons
    el.querySelectorAll('.vote-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const vote = btn.dataset.vote;
        const siblingVote = vote === 'up' ? 'down' : 'up';
        const sibling = el.querySelector(`.vote-btn[data-vote="${siblingVote}"]`);

        // Toggle vote
        const isActive = btn.classList.contains(`voted-${vote}`);
        btn.classList.toggle(`voted-${vote}`);
        if (sibling) sibling.classList.remove(`voted-${siblingVote}`);

        // Track preference
        trackVote(article.category, article.source, vote, !isActive);

        // Dismiss article on downvote
        if (vote === 'down' && !isActive) {
          const nextSibling = el.nextElementSibling;
          if (nextSibling && nextSibling.classList.contains('article-divider')) {
            nextSibling.style.display = 'none';
          }
          el.classList.add('dismissed');
          dismissedTitles.add(article.title);

          // Update tab counts with dismissed articles filtered out
          setTimeout(() => {
            const visibleArticles = allArticles.filter(a => !dismissedTitles.has(a.title));
            renderTabs(visibleArticles);
          }, 400);
        }
      });
    });

    feed.appendChild(el);

    // ASCII divider between articles
    if (i < filtered.length - 1) {
      const divider = document.createElement('div');
      divider.className = 'article-divider';
      divider.textContent = '· · · · ·';
      feed.appendChild(divider);
    }

    setTimeout(() => el.classList.add('visible'), i * 40);
  });
}

async function loadFullArticle(articleUrl, el) {
  const expandEl = el.querySelector('.article-expand');
  try {
    const extractUrl = `${CORS_PROXY}/?mode=extract&url=${encodeURIComponent(articleUrl)}`;
    const res = await fetch(extractUrl);
    if (!res.ok) throw new Error('Failed to fetch');
    const data = await res.json();

    let content = data.content || '';
    const summary = data.summary || '';
    const articleId = btoa(articleUrl).slice(0, 16);

    // If extraction failed or content is too short, use title + TLDR + summary as context
    const title = el.dataset.articleTitle || '';
    const tldr = el.dataset.articleTldr || '';
    if (!content || content === 'Could not extract article content.' || content.length < 100) {
      content = `Title: ${title}\n\nSummary: ${tldr}\n\n${summary ? 'AI Summary: ' + summary : ''}`;
    }

    // Store article content for follow-up questions
    el.dataset.articleContent = content;
    el.dataset.articleId = articleId;

    let html = '<div style="padding: 0.75rem 0 0.5rem 1.6rem">';

    if (summary) {
      html += `<div class="article-summary-label">AI Summary</div>`;
      html += `<div class="article-summary">${esc(summary)}</div>`;
    }

    if (content && content !== 'Could not extract article content.') {
      html += `<div class="article-raw-label" onclick="this.nextElementSibling.classList.toggle('show')">▸ View original text</div>`;
      html += `<div class="article-raw">${esc(content)}</div>`;
    }

    // Follow-up input
    html += `<div class="article-ask">
      <input class="article-ask-input" id="ask-${articleId}" placeholder="Ask a follow-up..." onkeydown="if(event.key==='Enter')askFollowUp('${articleId}',this.closest('.article'))">
      <button class="article-ask-btn" onclick="askFollowUp('${articleId}',this.closest('.article'))">Ask</button>
    </div>`;

    // Thread container for Q&A
    html += `<div class="article-thread" id="thread-${articleId}"></div>`;

    html += `<div class="article-footer">
      <a class="article-read-more" href="${esc(articleUrl)}" target="_blank" rel="noopener noreferrer">Read on source →</a>
    </div>`;
    html += '</div>';

    expandEl.innerHTML = html;
  } catch {
    expandEl.innerHTML = `
      <div style="padding: 0.75rem 0 0.5rem 1.6rem">
        <div class="article-content">Could not load article.</div>
        <a class="article-read-more" href="${esc(articleUrl)}" target="_blank" rel="noopener noreferrer">Read on source →</a>
      </div>
    `;
  }
}

// Conversation history per article
const conversations = {};

async function askFollowUp(articleId, articleEl) {
  const input = document.getElementById(`ask-${articleId}`);
  const thread = document.getElementById(`thread-${articleId}`);
  const question = input.value.trim();
  if (!question) return;

  let articleContent = articleEl.dataset.articleContent || '';
  // Fallback: use title + TLDR if no content
  if (!articleContent || articleContent.length < 50) {
    const title = articleEl.dataset.articleTitle || '';
    const tldr = articleEl.dataset.articleTldr || '';
    articleContent = `Title: ${title}\nSummary: ${tldr}`;
  }
  if (!articleContent || articleContent.length < 10) return;

  // Initialize conversation history
  if (!conversations[articleId]) conversations[articleId] = [];

  // Show question and loading
  input.value = '';
  thread.innerHTML += `<div class="thread-q">${esc(question)}</div>`;
  thread.innerHTML += `<div class="thread-loading" id="loading-${articleId}">Thinking...</div>`;

  // Disable input while loading
  const btn = articleEl.querySelector('.article-ask-btn');
  input.disabled = true;
  if (btn) btn.disabled = true;

  try {
    const res = await fetch(`${CORS_PROXY}/?mode=ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question,
        articleContent,
        conversationHistory: conversations[articleId],
      }),
    });

    const data = await res.json();
    const answer = data.answer || 'Could not generate a response.';

    // Store in conversation history
    conversations[articleId].push({ question, answer });

    // Replace loading with answer
    const loadingEl = document.getElementById(`loading-${articleId}`);
    if (loadingEl) {
      loadingEl.className = 'thread-a';
      loadingEl.id = '';
      loadingEl.textContent = answer;
    }
  } catch {
    const loadingEl = document.getElementById(`loading-${articleId}`);
    if (loadingEl) {
      loadingEl.className = 'thread-a';
      loadingEl.id = '';
      loadingEl.textContent = 'Failed to get a response. Try again.';
    }
  }

  input.disabled = false;
  if (btn) btn.disabled = false;
  input.focus();
}

function esc(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function updateTimestamp() {
  const el = document.getElementById('last-updated');
  const now = new Date();
  const h = now.getHours() % 12 || 12;
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = now.getHours() >= 12 ? 'pm' : 'am';
  el.textContent = `Updated ${h}:${m} ${ampm}`;
}

// --- Init ---
async function init() {
  try {
    allArticles = await fetchAllFeeds();
    if (allArticles.length === 0) {
      document.getElementById('feed').innerHTML =
        '<div class="error-state">No articles loaded. Will retry shortly.</div>';
      return;
    }
    renderTabs(allArticles);
    renderFeed(allArticles);
    updateTimestamp();
  } catch (err) {
    document.getElementById('feed').innerHTML =
      '<div class="error-state">Failed to load feeds. Will retry shortly.</div>';
  }
}

async function refresh() {
  localStorage.removeItem(CACHE_KEY);
  await init();
}

init();
setInterval(refresh, REFRESH_INTERVAL);
</script>
